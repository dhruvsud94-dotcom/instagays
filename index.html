<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INSTAGAYS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
  }

  body {
    font-family: 'Oswald', sans-serif;
    color: #b9fe00;
    line-height: 1.6;
    background-image: url('images/hero-still.jpeg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
    cursor: url('images/cursor.png'), auto;
    scroll-snap-type: y mandatory;
    overflow-y: scroll;
    height: 100dvh;
  }

  .panel {
    height: 100dvh;
    scroll-snap-align: start;
    scroll-snap-stop: always;
    display: flex;
    flex-direction: column;
  }

  .hero {
    justify-content: flex-start;
    align-items: flex-end;
    text-align: right;
    padding: 2rem 3rem 0 2rem;
  }

  .hero h1 {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: clamp(3rem, 12vw, 7rem);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: #b9fe00;
  }

  .nav-panel {
    justify-content: center;
    align-items: center;
  }

  .nav-link {
    text-decoration: none;
    font-size: clamp(2rem, 8vw, 4rem);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #b9fe00;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }

  .nav-link.visible {
    opacity: 1;
    transform: translateY(0);
  }

  footer {
    justify-content: center;
    align-items: center;
    text-align: center;
    font-size: 0.9rem;
    color: #b9fe00;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }

  footer.visible {
    opacity: 1;
    transform: translateY(0);
  }

  footer a {
    color: #b9fe00;
  }
</style>
</head>
<body>

  <div class="panel hero">
    <h1>Instagays</h1>
  </div>

  <div class="panel nav-panel">
    <a class="nav-link" href="https://youtu.be/c3wfBHFCAbY?si=zem0q0feoHvSk9Pr" target="_blank" rel="noopener">Watch</a>
  </div>

  <div class="panel nav-panel">
    <a class="nav-link" href="https://youtube.com/playlist?list=PLU1HOZv40ioxcMkAPuQAvs2xuL72be7wA&si=R67zjWxga_Gn-Wzu">Listen</a>
  </div>

  <div class="panel nav-panel">
    <a class="nav-link" href="https://www.instagram.com/instagays.mov/" target="_blank" rel="noopener">Follow</a>
  </div>

  <div class="panel nav-panel">
    <a class="nav-link" href="mailto:dhruvsud94@gmail.com">Contact</a>
  </div>

  <footer class="panel">
    <p>© 2026 Instagays</p>
  </footer>

  <script>
    const items = document.querySelectorAll('.nav-link, footer');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        entry.target.classList.toggle('visible', entry.isIntersecting);
      });
    }, { threshold: 0.5 });
    items.forEach(item => observer.observe(item));
  </script>

</body>
</html>
