<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INSTAGAYS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Oswald', sans-serif;
    color: #b9fe00;
    line-height: 1.6;
    background-image: url('images/hero-still.jpeg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
    min-height: 100dvh;
    cursor: url('images/cursor.png'), auto;
  }

  .hero {
    min-height: 60vh;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    text-align: center;
    padding: 4rem 2rem 2rem;
  }

  .hero h1 {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: clamp(3rem, 12vw, 7rem);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: #b9fe00;
  }

  nav {
    max-width: 500px;
    margin: 0 auto;
    padding: 3rem 2rem;
  }

  .nav-link {
    display: block;
    text-align: center;
    padding: 3rem 0;
    text-decoration: none;
    font-size: clamp(1.5rem, 5vw, 2.5rem);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #b9fe00;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }

  .nav-link.visible {
    opacity: 1;
    transform: translateY(0);
  }

  footer {
    text-align: center;
    padding: 3rem 2rem;
    font-size: 0.9rem;
    color: #b9fe00;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }

  footer.visible {
    opacity: 1;
    transform: translateY(0);
  }

  footer a {
    color: #b9fe00;
  }
</style>
</head>
<body>

  <div class="hero">
    <h1>Instagays</h1>
  </div>

  <nav>
    <a class="nav-link" href="about.html">About</a>
    <a class="nav-link" href="https://www.youtube.com/watch?v=Q3ntJgVdEho" target="_blank" rel="noopener">Watch</a>
    <a class="nav-link" href="listen.html">Listen</a>
    <a class="nav-link" href="https://www.instagram.com/" target="_blank" rel="noopener">Follow</a>
    <a class="nav-link" href="mailto:you@email.com">Contact</a>
  </nav>

  <script>
    const items = document.querySelectorAll('.nav-link, footer');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        entry.target.classList.toggle('visible', entry.isIntersecting);
      });
    }, { threshold: 0.3 });
    items.forEach(item => observer.observe(item));
  </script>

</body>
</html>
