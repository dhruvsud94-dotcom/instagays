<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
  }
  body {
    font-family: 'Oswald', sans-serif;
    color: #b9fe00;
    line-height: 1.6;
    background-image: url('images/hero-still.jpeg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
    cursor: url('images/cursor.png'), auto;
    scroll-snap-type: y mandatory;
    overflow-y: scroll;
    height: 100dvh;
  }
  @media (max-width: 768px) {
    body {
      background-image: url('images/hero-still-mobile.jpeg');
         background-size: cover;
          background-attachment: fixed;
    }
  }
  .marquee-banner {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 40px;
    background-color: #b9fe00;
    overflow: hidden;
    z-index: 1000;
    display: flex;
    align-items: center;
  }
  .marquee-track {
    display: flex;
    white-space: nowrap;
    animation: marquee-scroll 12s linear infinite;
  }
  .marquee-track a {
    color: #fe2687;
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: 1.1rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding-right: 3rem;
    text-decoration: none;
  }
  @keyframes marquee-scroll {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
  .panel {
    height: 100dvh;
    scroll-snap-align: start;
    scroll-snap-stop: always;
    display: flex;
    align-items: center;
    padding-top: 40px;
  }
  .col {
    width: min(500px, 80vw);
    margin-left: 3rem;
  }
  .hero h1 {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: clamp(3rem, 10vw, 6rem);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    text-align: left;
    opacity: 0;
  }
  .hero h1.visible {
    animation: flicker-color 1s steps(1, end) forwards;
  }
  @keyframes flicker-color {
    0%   { opacity: 0; color: #b9fe00; }
    10%  { opacity: 1; color: #fe2687; }
    20%  { opacity: 0; color: #72d9fb; }
    30%  { opacity: 1; color: #ff1035; }
    45%  { opacity: 0.2; color: #b9fe00; }
    55%  { opacity: 1; color: #72d9fb; }
    70%  { opacity: 0.3; color: #fe2687; }
    85%  { opacity: 1; color: #ff1035; }
    100% { opacity: 1; color: #b9fe00; }
  }
  .nav-link {
    display: block;
    text-align: center;
    text-decoration: none;
    font-weight: 700;
    font-size: clamp(2rem, 8vw, 4rem);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #b9fe00;
    opacity: 0;
  }
  .nav-link.visible {
    animation: flicker-in 0.6s steps(1, end) forwards;
  }
  @keyframes flicker-in {
    0%   { opacity: 0; }
    10%  { opacity: 1; }
    20%  { opacity: 0; }
    30%  { opacity: 1; }
    45%  { opacity: 0.2; }
    55%  { opacity: 1; }
    70%  { opacity: 0.3; }
    85%  { opacity: 1; }
    100% { opacity: 1; }
  }
  footer p {
    text-align: center;
    font-size: 0.9rem;
    color: #b9fe00;
    opacity: 0;
  }
  footer p.visible {
    animation: flicker-in 0.6s steps(1, end) forwards;
  }
  footer a {
    color: #b9fe00;
  }
</style>
</head>
<body>
  <div class="marquee-banner">
    <div class="marquee-track">

      <a class="nav-link" href="mailto:dhruvsud94@gmail.com">Contact</a>

  <script>
    const items = document.querySelectorAll('.hero h1, .nav-link, footer p');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.remove('visible');
          void entry.target.offsetWidth; // restart animation
          entry.target.classList.add('visible');
        } else {
          entry.target.classList.remove('visible');
        }
      });
    }, { threshold: 0.5 });
    items.forEach(item => observer.observe(item));
  </script>
