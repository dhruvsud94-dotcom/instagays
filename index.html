<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INSTAGAYS — A Short Film</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Oswald', sans-serif;
    color: #b9fe00;
    line-height: 1.6;
    background-image: url('images/hero-still.jpeg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
    cursor: url('images/cursor.png'), auto;
    min-height: 100dvh;
  }

  .hero {
    min-height: 60vh;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: flex-start;
    text-align: left;
    padding: 2rem 2rem 2rem 3rem;
  }

  .hero h1 {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: clamp(3rem, 12vw, 7rem);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: #b9fe00;
  }

  nav {
    max-width: 500px;
    margin: 0 auto;
    padding: 3rem 2rem;
  }

  .nav-link {
    display: block;
    text-align: center;
    padding: 3rem 0;
    text-decoration: none;
    font-weight: 700;
    font-size: clamp(1.5rem, 5vw, 2.5rem);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #b9fe00;
    opacity: 0;
  }

  .nav-link.visible {
    animation: flicker-in 0.6s steps(1, end) forwards;
  }

  @keyframes flicker-in {
    0%   { opacity: 0; }
    10%  { opacity: 1; }
    20%  { opacity: 0; }
    30%  { opacity: 1; }
    45%  { opacity: 0.2; }
    55%  { opacity: 1; }
    70%  { opacity: 0.3; }
    85%  { opacity: 1; }
    100% { opacity: 1; }
  }

  footer {
    text-align: center;
    padding: 3rem 2rem;
    font-size: 0.9rem;
    color: #b9fe00;
    opacity: 0;
  }

  footer.visible {
    animation: flicker-in 0.6s steps(1, end) forwards;
  }

  footer a {
    color: #b9fe00;
  }
</style>
</head>
<body>

  <div class="hero">
    <h1>Instagays</h1>
  </div>

  <nav>
    <a class="nav-link" href="about.html">About</a>
    <a class="nav-link" href="https://www.youtube.com/watch?v=Q3ntJgVdEho" target="_blank" rel="noopener">Watch</a>
    <a class="nav-link" href="listen.html">Listen</a>
    <a class="nav-link" href="https://www.instagram.com/" target="_blank" rel="noopener">Follow</a>
    <a class="nav-link" href="mailto:you@email.com">Contact</a>
  </nav>

  <footer>
    <p>© 2026 Instagays</p>
  </footer>

  <script>
    const items = document.querySelectorAll('.nav-link, footer');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.remove('visible');
          void entry.target.offsetWidth; // restart animation
          entry.target.classList.add('visible');
        } else {
          entry.target.classList.remove('visible');
        }
      });
    }, { threshold: 0.3 });
    items.forEach(item => observer.observe(item));
  </script>

</body>
</html>
